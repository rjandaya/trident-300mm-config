[gcode_macro G32]
description: Full home process that will home and perform leveling / tilt adjustments
gcode:
    BED_MESH_CLEAR
    _CG28
    STATUS_LEVELING
    Z_TILT_ADJUST
    STATUS_HOMING
    G28 Z


[gcode_macro _CG28]
description: Home if not already homed.
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        STATUS_HOMING
        G28
    {% endif %}


[gcode_macro PRINT_START]
description: Use PRINT_START for the slicer starting script - please customise for your slicer of choice
gcode:
    {% set bedtemp = params.BED|int %}
    {% set hotendtemp = params.HOTEND|int %}
    {% set chambertemp = params.CHAMBER|default(0)|int %}

    CLEAR_PAUSE
    G92 E0                                                                      ; zero the extruder
    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} SQUARE_CORNER_VELOCITY=5 MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio} 
    SET_GCODE_OFFSET Z=0                                                        ; reset z-offset
    SET_PRESSURE_ADVANCE EXTRUDER=extruder ADVANCE=0                            ; reset pressure advance
    M221 S100                                                                   ; reset extrusion factor
    M107

    SET_PIN PIN=caselight VALUE=0.10
    M190 S{bedtemp}                                                             ; set & wait for bed temp
    {% if bedtemp >= 90 %}
      TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={chambertemp}                  ; wait for chamber temp
      {action_respond_info("Heating chamber to %d °C" % chambertemp)}
    {% endif %}
    M109 S150                                                                   ; Preheat nozzle for Tap

    G32                                                                         ; home all axes/tilt
    STATUS_MESHING
    # BED_MESH_CALIBRATE PRINT_MIN={params.PRINT_MIN} PRINT_MAX={params.PRINT_MAX} FORCE_NEW_MESH=True
    BED_MESH_CALIBRATE ADAPTIVE=1
    STATUS_READY
    G1 X0 Y300 Z20 F3000                                                        ; move nozzle away from bed
    M109 S{hotendtemp}                                                          ; set & wait for hotend temp
    G1 E10.0 F3600                                                              ; prime filament
    SET_PIN PIN=caselight VALUE=1.00
    STATUS_PRINTING


[gcode_macro PRINT_END]
description: Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    SAVE_GCODE_STATE NAME=STATE_PRINT_END

    M400                                                                        ; wait for buffer to clear
    G92 E0                                                                      ; zero the extruder
    G1 E-10.0 F3600                                                             ; retract filament
    G91                                                                         ; relative positioning
    G0 Z1.00 X20.0 Y20.0 F20000                                                 ; move nozzle to remove stringing
    G1 Z2 F3000                                                                 ; move nozzle up 2mm
    PARKREAR
    BED_MESH_CLEAR
    
    # The purpose of the SAVE_GCODE_STATE/RESTORE_GCODE_STATE
    # command pair is to restore the printer's coordinate system
    # and speed settings since the commands above change them.
    # However, to prevent any accidental, unintentional toolhead
    # moves when restoring the state, explicitly set MOVE=0.
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END MOVE=0

    TURN_OFF_HEATERS                                                            ; turn bed / hotend off
    SET_PIN PIN=caselight VALUE=0                                               ; turn case light off
    M107                                                                        ; turn print cooling fan off
    # {% if printer.heater_bed.temperature|int >= 90 %}
    #   STATUS_CLEANING
    #   G4 P900000                                                                ; when printing ASA/ABS, filter for 15min
    # {% endif %}
    SET_FAN_SPEED FAN=exhaust_fan SPEED=0                                       ; turn exhaust fan off
    STATUS_READY


[gcode_macro OFF]
description: Turn off everything
gcode:
    M84                                                                         ; turn steppers off
    TURN_OFF_HEATERS                                                            ; turn bed / hotend off
    M107                                                                        ; turn print cooling fan off
    SET_FAN_SPEED FAN=exhaust_fan SPEED=0                                       ; turn exhaust fan off
    SET_PIN PIN=caselight VALUE=0                                               ; turn case light off
    STATUS_OFF


[gcode_macro SHUTDOWN]
description: Full system shutdown
gcode:
    OFF                                                                         ; Shortcut to turn everything off (see above for this macro)
    {action_respond_info('action:poweroff')}                                    ; OctoPrint compatible host shutdown
	{action_call_remote_method("shutdown_machine")}                             ; Moonraker compatible host shutdown


[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    # Parameters
    {% set z = params.Z|default(10)|int %}                                                   ; z hop amount

    {% if printer['pause_resume'].is_paused|int == 0 %}
        STATUS_BUSY
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}                             ; set z hop variable for reference in resume macro
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target}   ; set hotend temp variable for reference in resume macro
        # SET_FILAMENT_SENSOR SENSOR=switch_sensor ENABLE=0                                   ; disable filament switch_sensor
        # SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0                                  ; disable filament encoder_sensor
        SAVE_GCODE_STATE NAME=PAUSE                                                         ; save current print position for resume
        BASE_PAUSE                                                                          ; pause print
        {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}      ; check that zhop does not exceed z max
            G91                                                                             ; relative positioning
            G1 Z{z} F900                                                                    ; raise Z up by z hop amount
        {% else %}
            { action_respond_info("Pause zhop exceeds maximum Z height.") }                 ; if z max is exceeded, show message and set zhop value for resume to 0
            SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE=0
        {% endif %}
        G90                                                                                 ; absolute positioning
        G1 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} F6000  ; park toolhead at front center
        SAVE_GCODE_STATE NAME=PAUSEPARK                                                     ; save parked position in case toolhead is moved during the pause (otherwise the return zhop can error)
        M104 S0                                                                             ; turn off hotend
        SET_IDLE_TIMEOUT TIMEOUT=43200                                                      ; set timeout to 12 hours
    {% endif %}


[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
gcode:
    # Parameters
    {% set e = params.E|default(2.5)|int %}                                          ; hotend prime amount (in mm)

    {% if printer['pause_resume'].is_paused|int == 1 %}
        STATUS_PRINTING
        # SET_FILAMENT_SENSOR SENSOR=switch_sensor ENABLE=0                            ; disable filament switch_sensor
        # SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0                           ; disable filament encoder_sensor
        SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}  ; set timeout back to configured value
        {% if etemp > 0 %}
            M109 S{etemp|int}                                                        ; wait for hotend to heat back up
        {% endif %}
        RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=100                     ; go back to parked position in case toolhead was moved during pause (otherwise the return zhop can error)
        G91                                                                          ; relative positioning
        M83                                                                          ; relative extruder positioning
        {% if printer[printer.toolhead.extruder].temperature >= printer.configfile.settings.extruder.min_extrude_temp %}
            G1 Z{zhop * -1} E{e} F900                                                ; prime nozzle by E, lower Z back down
        {% else %}
            G1 Z{zhop * -1} F900                                                     ; lower Z back down without priming (just in case we are testing the macro with cold hotend)
        {% endif %}
        RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=60                          ; restore position
        BASE_RESUME                                                                  ; resume print
    {% endif %}


[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}  ; set timeout back to configured value
    CLEAR_PAUSE
    # SDCARD_RESET_FILE
    PRINT_END
    BASE_CANCEL_PRINT


[gcode_macro M600]
description: Replace M600 color change gcode for PAUSE
gcode:
    PAUSE


[gcode_macro M109]
rename_existing: M99109
gcode:
    #Parameters
    {% set s = params.S|float %}

    STATUS_HEATING
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}             ; Set hotend temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}              ; Wait for hotend temp (within 1 degree)
    {% endif %}


[gcode_macro M190]
rename_existing: M99190
gcode:
    #Parameters
    {% set s = params.S|float %}

    STATUS_HEATING
    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}             ; Set bed temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s} MAXIMUM={s+1}            ; Wait for bed temp (within 1 degree)
    {% endif %}


